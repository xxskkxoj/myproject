{% extends 'base.html' %}
{% block title %}Login - SilverBoost{% endblock %}
{% block content %}
  <section class="card form-card">
    <h2 style="text-align:center;margin-top:0;margin-bottom:8px">Login</h2>
    <p style="text-align:center;color:var(--muted);margin-top:0;margin-bottom:18px">Enter your account details to continue</p>
    <form method="post" action="{{ url_for('login') }}">
      <label>Username</label>
      <input name="username" type="text" required>
      <label>Password</label>
      <input name="password" type="password" required>
      <div class="form-actions">
        <button class="btn primary" type="submit">Sign in</button>
        <a class="link" href="{{ url_for('register') }}">No account? Register</a>
      </div>
    </form>
  </section>
{% endblock %}
